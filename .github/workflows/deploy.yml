name: WordPress on AWS - Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: eu-central-1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/myDevKey.pem
          chmod 400 ~/.ssh/myDevKey.pem

      - name: Install Ansible and boto3
        run: |
          pip install ansible boto3 botocore
          ansible-galaxy collection install amazon.aws

      - name: Configure WordPress servers
        run: |
          echo "${{ secrets.VAULT_PASS }}" > /tmp/.vault_pass
          chmod 600 /tmp/.vault_pass
          cd ansible
          ansible-playbook playbooks/wordpress.yml --vault-password-file /tmp/.vault_pass
          rm -f /tmp/.vault_pass