name: WordPress on AWS - Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: eu-central-1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/myDevKey.pem
          chmod 400 ~/.ssh/myDevKey.pem

      - name: Install Ansible and boto3
        run: |
          pip install ansible boto3 botocore
          ansible-galaxy collection install amazon.aws

      - name: Get Jenkins IP
        run: |
          JENKINS_IP=$(aws ec2 describe-instances \
            --region eu-central-1 \
            --filters "Name=tag:Role,Values=jenkins" "Name=instance-state-name,Values=running" \
            --query "Reservations[].Instances[].PublicIpAddress" \
            --output text)
          echo "Jenkins IP: $JENKINS_IP"
          sed -i "s|YOUR_JENKINS_IP|$JENKINS_IP|" ansible/roles/inventory/wordpress.aws_ec2.yml

      - name: Get RDS endpoint
        run: |
          RDS_ENDPOINT=$(aws rds describe-db-instances \
            --region eu-central-1 \
            --query "DBInstances[0].Endpoint.Address" \
            --output text)
          echo "RDS Endpoint: $RDS_ENDPOINT"
          sed -i "s|db_host: \"\"|db_host: \"$RDS_ENDPOINT\"|" ansible/roles/wordpress/vars/main.yml

      - name: Write Ansible secrets
        run: |
          echo "${{ secrets.VAULT_PASS }}" > /tmp/.vault_pass
          chmod 600 /tmp/.vault_pass
          cat > ansible/roles/wordpress/vars/secrets.yml << 'EOF'
          ${{ secrets.ANSIBLE_SECRETS }}
          EOF
          cd ansible
          ansible-vault encrypt roles/wordpress/vars/secrets.yml --vault-password-file /tmp/.vault_pass

      - name: Suspend ASG health checks
        run: |
          aws autoscaling suspend-processes \
            --auto-scaling-group-name WordPress-ASG \
            --scaling-processes HealthCheck ReplaceUnhealthy \
            --region eu-central-1

      - name: Configure WordPress servers
        run: |
          cd ansible
          ansible-playbook playbooks/wordpress.yml --vault-password-file /tmp/.vault_pass
          rm -f /tmp/.vault_pass

      - name: Resume ASG health checks
        if: always()
        run: |
          aws autoscaling resume-processes \
            --auto-scaling-group-name WordPress-ASG \
            --scaling-processes HealthCheck ReplaceUnhealthy \
            --region eu-central-1