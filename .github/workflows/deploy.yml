cat > /Users/user/Desktop/Wordpress-AWS/.github/workflows/deploy.yml << 'WORKFLOW'
name: WordPress on AWS - Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: eu-central-1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Write tfvars file
        run: |
          cat > terraform/environments/dev/terraform.tfvars << 'EOF'
          ${{ secrets.TFVARS_CONTENT }}
          EOF

      - name: Terraform Init
        run: cd terraform/environments/dev && terraform init

      - name: Terraform Plan
        run: cd terraform/environments/dev && terraform plan -var-file=terraform.tfvars

      - name: Terraform Apply
        run: cd terraform/environments/dev && terraform apply -var-file=terraform.tfvars --auto-approve

      - name: Get RDS Endpoint
        id: rds
        run: |
          RDS_ENDPOINT=$(cd terraform/environments/dev && terraform output -raw rds_endpoint)
          echo "rds_endpoint=$RDS_ENDPOINT" >> $GITHUB_OUTPUT

      - name: Update Ansible vars with RDS endpoint
        run: |
          sed -i 's|db_host: ""|db_host: "${{ steps.rds.outputs.rds_endpoint }}"|' ansible/roles/wordpress/vars/main.yml

      - name: Install Ansible and boto3
        run: |
          pip install ansible boto3 botocore
          ansible-galaxy collection install amazon.aws

      - name: Configure WordPress servers
        run: |
          echo "${{ secrets.VAULT_PASS }}" > /tmp/.vault_pass
          chmod 600 /tmp/.vault_pass
          cd ansible
          ansible-playbook playbooks/wordpress.yml --vault-password-file /tmp/.vault_pass
          rm -f /tmp/.vault_pass
WORKFLOW