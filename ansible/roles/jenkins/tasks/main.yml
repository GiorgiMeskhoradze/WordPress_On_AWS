---
# Jenkins Server Setup
# Installs: Java, Jenkins, Ansible, Git, Terraform, AWS CLI, Python3/boto3

# ── SYSTEM ────────────────────────────────────────────────
- name: Update apt cache
  apt:
    update_cache: yes

# ── JAVA ──────────────────────────────────────────────────
# Required by Jenkins — cannot start without it
- name: Install Java
  apt:
    name:
      - fontconfig
      - openjdk-21-jre
    state: present

# ── JENKINS ───────────────────────────────────────────────
# Not in Ubuntu default repos — requires own key + repository
- name: Ensure keyrings directory exists
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Download Jenkins GPG key
  get_url:
    url: https://pkg.jenkins.io/debian-stable/jenkins.io-2026.key
    dest: /etc/apt/keyrings/jenkins-keyring.asc
    mode: '0644'

- name: Add Jenkins repository
  copy:
    content: "deb [signed-by=/etc/apt/keyrings/jenkins-keyring.asc] https://pkg.jenkins.io/debian-stable binary/"
    dest: /etc/apt/sources.list.d/jenkins.list

- name: Install Jenkins
  apt:
    name: jenkins
    state: present
    update_cache: yes

- name: Enable and start Jenkins
  systemd:
    name: jenkins
    enabled: yes
    state: started

# ── ANSIBLE ───────────────────────────────────────────────
# PPA required for latest version
- name: Add Ansible PPA
  apt_repository:
    repo: ppa:ansible/ansible
    state: present

- name: Install Ansible
  apt:
    name: ansible
    state: present
    update_cache: yes

# ── GIT ───────────────────────────────────────────────────
- name: Install Git
  apt:
    name: git
    state: present

# ── TERRAFORM ─────────────────────────────────────────────
# HashiCorp requires own key + repository
- name: Download HashiCorp GPG key
  get_url:
    url: https://apt.releases.hashicorp.com/gpg
    dest: /tmp/hashicorp.gpg

- name: Convert HashiCorp GPG key
  shell: gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg /tmp/hashicorp.gpg
  args:
    creates: /usr/share/keyrings/hashicorp-archive-keyring.gpg

- name: Add HashiCorp repository
  shell: echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | tee /etc/apt/sources.list.d/hashicorp.list
  args:
    creates: /etc/apt/sources.list.d/hashicorp.list

- name: Install Terraform
  apt:
    name: terraform
    state: present
    update_cache: yes

# ── AWS CLI ───────────────────────────────────────────────
# No apt repository available — manual install required
- name: Install unzip
  apt:
    name: unzip
    state: present

- name: Download AWS CLI
  get_url:
    url: https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip
    dest: /tmp/awscliv2.zip

- name: Unzip AWS CLI
  unarchive:
    src: /tmp/awscliv2.zip
    dest: /tmp/
    remote_src: yes

- name: Install AWS CLI
  shell: /tmp/aws/install
  args:
    creates: /usr/local/bin/aws

# ── PYTHON3 + BOTO3 ───────────────────────────────────────
# Ansible requires boto3 for AWS dynamic inventory
- name: Install Python3 and pip
  apt:
    name:
      - python3
      - python3-pip
    state: present

- name: Install boto3
  pip:
    name: boto3
    executable: pip3
    extra_args: --break-system-packages