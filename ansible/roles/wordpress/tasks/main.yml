---
# WordPress Server Setup
# user_data.sh handles: Nginx, PHP-FPM, EFS mount
# Ansible handles: WordPress files, wp-config, Nginx config

# ── WAIT FOR USER DATA ────────────────────────────────────
- name: Wait for user_data to complete
  wait_for:
    path: /tmp/userdata_complete
    timeout: 300

# ── SYSTEM ────────────────────────────────────────────────
- name: Update apt cache
  apt:
    update_cache: yes

# ── WORDPRESS ─────────────────────────────────────────────
- name: Create WordPress directory
  file:
    path: "{{ wp_install_dir }}"
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'

- name: Download WordPress
  get_url:
    url: https://wordpress.org/latest.tar.gz
    dest: /tmp/wordpress.tar.gz

- name: Extract WordPress
  unarchive:
    src: /tmp/wordpress.tar.gz
    dest: /tmp/
    remote_src: yes

- name: Copy WordPress files to install dir
  copy:
    src: /tmp/wordpress/
    dest: "{{ wp_install_dir }}/"
    remote_src: yes
    owner: www-data
    group: www-data

# ── WP-CONFIG ─────────────────────────────────────────────
# Credentials injected at runtime from vars — never hardcoded
- name: Deploy wp-config.php from template
  template:
    src: wp-config.j2
    dest: "{{ wp_install_dir }}/wp-config.php"
    owner: www-data
    group: www-data
    mode: '0640'

# ── NGINX CONFIG ──────────────────────────────────────────
- name: Deploy Nginx config from template
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/sites-available/wordpress
  notify: Reload Nginx

- name: Enable WordPress site
  file:
    src: /etc/nginx/sites-available/wordpress
    dest: /etc/nginx/sites-enabled/wordpress
    state: link
  notify: Reload Nginx

- name: Remove default Nginx site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Reload Nginx